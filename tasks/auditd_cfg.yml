# /etc/audit/auditd.conf settings
- name: Ensures audit logs are retained
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: '^max_log_file_action\s*='
    line: max_log_file_action = KEEP_LOGS
    state: present

# 35738 - Discretionary access control permission modification events
- name: Ensure permission modification events are collected
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/50-perm_mod.rules
    owner: root
    group: root
    mode: '0640'
    content: |
      -a always,exit -F arch=b64 -S chmod,fchmod,fchmodat -F auid>=1000 -F auid!=unset -k perm_mod
      -a always,exit -F arch=b32 -S chmod,fchmod,fchmodat -F auid>=1000 -F auid!=unset -k perm_mod
      -a always,exit -F arch=b64 -S chown,fchown,lchown,fchownat -F auid>=1000 -F auid!=unset -k perm_mod
      -a always,exit -F arch=b32 -S chown,fchown,lchown,fchownat -F auid>=1000 -F auid!=unset -k perm_mod
      -a always,exit -F arch=b64 -S setxattr,lsetxattr,fsetxattr,removexattr,lremovexattr,fremovexattr -F auid>=1000 -F auid!=unset -k perm_mod
      -a always,exit -F arch=b32 -S setxattr,lsetxattr,fsetxattr,removexattr,lremovexattr,fremovexattr -F auid>=1000 -F auid!=unset -k perm_mod

# 35734 - Ensure events that modify date and time information are collected
- name: Ensure date and time modification events are collected
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/50-time-change.rules
    owner: root
    group: root
    mode: '0640'
    content: |
      -a always,exit -F arch=b64 -S adjtimex,settimeofday -k time-change
      -a always,exit -F arch=b32 -S adjtimex,settimeofday -k time-change
      -a always,exit -F arch=b64 -S clock_settime -F a0=0x0 -k time-change
      -a always,exit -F arch=b32 -S clock_settime -F a0=0x0 -k time-change
      -w /etc/localtime -p wa -k time-change

# 35733 - Events that modify the sudo log file
- name: Ensure sudo log file modification events are collected
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/50-sudo.rules
    owner: root
    group: root
    mode: '0640'
    content: |
      -w /var/log/sudo.log -p wa -k sudo_log_file

# 35743 - Events that modify Mandatory Access Controls
- name: Ensure MAC modification events are collected
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/50-MAC-policy.rules
    owner: root
    group: root
    mode: '0640'
    content: |
      -w /etc/apparmor/ -p wa -k MAC-policy
      -w /etc/apparmor.d/ -p wa -k MAC-policy

# 35735 - Ensure events that modify the system's network environment are collected
- name: Ensure network environment modification events are collected
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/50-system-locale.rules
    owner: root
    group: root
    mode: '0640'
    content: |
      -a always,exit -F arch=b64 -S sethostname,setdomainname -k system-locale
      -a always,exit -F arch=b32 -S sethostname,setdomainname -k system-locale
      -w /etc/issue -p wa -k system-locale
      -w /etc/issue.net -p wa -k system-locale
      -w /etc/hosts -p wa -k system-locale
      -w /etc/networks -p wa -k system-locale
      -w /etc/network/ -p wa -k system-locale
      -w /etc/netplan/ -p wa -k system-locale

# 35737 - Ensure events that modify user/group information are collected
- name: Ensure user and group modification events are collected
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/50-identity.rules
    owner: root
    group: root
    mode: '0640'
    content: |
      -w /etc/group -p wa -k identity
      -w /etc/passwd -p wa -k identity
      -w /etc/gshadow -p wa -k identity
      -w /etc/shadow -p wa -k identity
      -w /etc/security/opasswd -p wa -k identity
      -w /etc/nsswitch.conf -p wa -k identity
      -w /etc/pam.conf -p wa -k identity
      -w /etc/pam.d -p wa -k identity

# 35742 - File deletion events by users
- name: Ensure file deletion events by users are collected
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/50-delete.rules
    owner: root
    group: root
    mode: '0640'
    content: |
      -a always,exit -F arch=b64 -S unlink,unlinkat,rename,renameat -F auid>=1000 -F auid!=unset -k delete
      -a always,exit -F arch=b32 -S unlink,unlinkat,rename,renameat -F auid>=1000 -F auid!=unset -k delete

# User emulation events
- name: Ensure user emulation events are collected
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/50-user_emulation.rules
    owner: root
    group: root
    mode: '0640'
    content: |
      -a always,exit -F arch=b64 -C euid!=uid -F auid!=unset -S execve -k user_emulation
      -a always,exit -F arch=b32 -C euid!=uid -F auid!=unset -S execve -k user_emulation

# 35730 - Ensure system warns when audit logs are low on space
- name: Set auditd space_left_action to warn
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: '^space_left_action\s*='
    line: space_left_action = SYSLOG
    state: present

- name: Set auditd admin_space_left_action to halt
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: '^admin_space_left_action\s*='
    line: admin_space_left_action = HALT
    state: present

# 35731 - Ensure changes to system administration scope (sudoers) is collected
- name: Ensure sudoers changes are collected
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/50-scope.rules
    owner: root
    group: root
    mode: '0640'
    content: |
      -w /etc/sudoers -p wa -k scope
      -w /etc/sudoers.d/ -p wa -k scope

# 35736 - Ensure unsuccessful file access attempts are collected
- name: Ensure unsuccessful file access attempts are collected
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/50-access.rules
    owner: root
    group: root
    mode: '0640'
    content: |
      -a always,exit -F arch=b64 -S creat,open,openat,truncate,ftruncate -F exit=-EACCES -F auid>=1000 -F auid!=unset -k access
      -a always,exit -F arch=b32 -S creat,open,openat,truncate,ftruncate -F exit=-EACCES -F auid>=1000 -F auid!=unset -k access
      -a always,exit -F arch=b64 -S creat,open,openat,truncate,ftruncate -F exit=-EPERM -F auid>=1000 -F auid!=unset -k access
      -a always,exit -F arch=b32 -S creat,open,openat,truncate,ftruncate -F exit=-EPERM -F auid>=1000 -F auid!=unset -k access

# 35739 - Ensure successful file system mounts are collected
- name: Ensure successful file system mounts are collected
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/50-mounts.rules
    owner: root
    group: root
    mode: '0640'
    content: |
      -a always,exit -F arch=b64 -S mount -F auid>=1000 -F auid!=unset -k mounts
      -a always,exit -F arch=b32 -S mount -F auid>=1000 -F auid!=unset -k mounts

# 35740 - Ensure session initiation information is collected
- name: Ensure session initiation information is collected
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/50-session.rules
    owner: root
    group: root
    mode: '0640'
    content: |
      -w /var/run/utmp -p wa -k session
      -w /var/log/wtmp -p wa -k session
      -w /var/log/btmp -p wa -k session

# 35741 - Ensure login and logout events are collected
- name: Ensure login and logout events are collected
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/50-logins.rules
    owner: root
    group: root
    mode: '0640'
    content: |
      -w /var/log/lastlog -p wa -k logins
      -w /var/run/faillock -p wa -k logins

# 35744, 35745, 35746 - chcon, setfacl, chacl command attempts
- name: Ensure chcon, setfacl and chacl command attempts are collected
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/50-perm_chng.rules
    owner: root
    group: root
    mode: '0640'
    content: |
      -a always,exit -F path=/usr/bin/chcon -F perm=x -F auid>=1000 -F auid!=unset -k perm_chng
      -a always,exit -F path=/usr/bin/setfacl -F perm=x -F auid>=1000 -F auid!=unset -k perm_chng
      -a always,exit -F path=/usr/bin/chacl -F perm=x -F auid>=1000 -F auid!=unset -k perm_chng

# 35747 - Ensure usermod command attempts are collected
- name: Ensure usermod command attempts are collected
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/50-usermod.rules
    owner: root
    group: root
    mode: '0640'
    content: |
      -a always,exit -F path=/usr/sbin/usermod -F perm=x -F auid>=1000 -F auid!=unset -k usermod

# 35748 - Ensure kernel module loading, unloading and modification is collected
- name: Ensure kernel module modification events are collected
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/50-kernel_modules.rules
    owner: root
    group: root
    mode: '0640'
    content: |
      -a always,exit -F arch=b64 -S init_module,finit_module,delete_module,create_module,query_module -F auid>=1000 -F auid!=unset -k kernel_modules
      -a always,exit -F arch=b32 -S init_module,finit_module,delete_module,create_module,query_module -F auid>=1000 -F auid!=unset -k kernel_modules
      -a always,exit -F path=/usr/bin/kmod -F perm=x -F auid>=1000 -F auid!=unset -k kernel_modules

# Clean up old/replaced rule files
- name: Remove old separate chacl rules file
  ansible.builtin.file:
    path: /etc/audit/rules.d/50-perm_chacl.rules
    state: absent

- name: Remove old separate perm_acl rules file
  ansible.builtin.file:
    path: /etc/audit/rules.d/50-perm_acl.rules
    state: absent

- name: Remove old modules rules file
  ansible.builtin.file:
    path: /etc/audit/rules.d/50-modules.rules
    state: absent

# 35749 - Ensure the audit configuration is immutable
# IMPORTANT: This must be the last rule file loaded - prefix 99 ensures it loads last
# NOTE: Once -e 2 is active a reboot is required to load any new rules
- name: Ensure audit configuration is immutable
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/99-finalize.rules
    owner: root
    group: root
    mode: '0640'
    content: |
      -e 2

# Reload audit rules after all changes
- name: Load updated audit rules
  ansible.builtin.command:
    cmd: augenrules --load
  register: augenrules_result
  changed_when: "'No change' not in augenrules_result.stdout"
  failed_when:
    - augenrules_result.rc != 0
    - "'Rule exists' not in augenrules_result.stderr"
    - "'No change' not in augenrules_result.stdout"
    - "augenrules_result.stdout != ''"
    - "augenrules_result.stderr != ''"
